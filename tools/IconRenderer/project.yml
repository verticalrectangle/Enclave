name: IconRenderer
options:
  bundleIdPrefix: tools.enclave
  deploymentTarget:
    iOS: "26.0"
targets:
  IconRenderer:
    type: application
    platform: iOS
    sources: [Sources]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tools.enclave.IconRenderer
        TARGETED_DEVICE_FAMILY: "1,2"          # Universal (iPhone + iPad) so QA can run on iPhone 17 Pro while capture uses iPad framebuffer
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""   # no app icon needed
        SWIFT_VERSION: "5.0"
